# Local Supabase project config.
# Generated by `supabase init` and edited for this project.
# Do NOT commit secrets here — use .env files instead.

project_id = "strix-webapp"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
ip_version = "IPv4"

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.scan-artifacts]
public = false
file_size_limit = "100MiB"
allowed_mime_types = ["text/markdown", "application/json", "text/plain", "application/octet-stream"]

[storage.buckets.user-uploads]
public = false
file_size_limit = "10MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false  # set true in production

[auth.sms]
enable_signup = false

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

# Inject org_id + org_role into the JWT on every token issuance.
# Defined in supabase/migrations/20260427000002_jwt_hook.sql.
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

# OAuth provider for "Login with GitHub" (different from the GitHub *integration*).
# Configure secrets via env in the Supabase dashboard for cloud, or via local env locally.
[auth.external.github]
enabled = false  # flip to true after setting client_id / secret
client_id = ""
secret = ""
redirect_uri = ""

[edge_runtime]
enabled = true
inspector_port = 8083

[analytics]
enabled = false
